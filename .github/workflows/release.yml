name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: snapdiff-linux-x86_64
          - os: macos-latest
            artifact: snapdiff-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl
          echo "CFLAGS=-I$(brew --prefix openssl)/include" >> $GITHUB_ENV
          echo "LDFLAGS=-L$(brew --prefix openssl)/lib"   >> $GITHUB_ENV

      - name: Configure & build
        run: ./configure && make

      - name: Rename binary
        run: cp snapdiff ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^(## \[|\[.*\]:)/{exit} found{print}" \
            CHANGELOG.md > release_notes.txt

      - uses: actions/download-artifact@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: |
            snapdiff-linux-x86_64/snapdiff-linux-x86_64
            snapdiff-macos-x86_64/snapdiff-macos-x86_64
